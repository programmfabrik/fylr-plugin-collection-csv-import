plugin:
  name: collection-csv-import
  version: "2.1.0"
  l10n: l10n/collection-csv-import.csv
  displayname:
    de-DE: Collection CSV Import
    en-US: Collection CSV Import

collection_upload:
  csv_import:
    config:
      - name: csv_import
        parameters:
          enabled:
            type: bool
            default: true
            position: 0
          add_to_subcollection:
            type: bool
            default: true
            position: 1
          import_settings:
            type: json
            plugin_type: csv_config
            position: 2

    callbacks:
      objects:
        exec:
          service: "node"
          commands:
            - prog: "node"
              stdin:
                type: body
              stdout:
                type: body
              args:
                - type: "value"
                  value: "%_exec.pluginDir%/server/collection/csv_import.js"

custom_events:
  COLLECTION_CSV_IMPORT_INFO:
    user: true
  COLLECTION_CSV_IMPORT_WARNING:
    user: true
  COLLECTION_CSV_IMPORT_ERROR:
    user: true

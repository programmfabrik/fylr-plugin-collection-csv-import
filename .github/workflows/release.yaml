name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.webfrontend_access }}

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Extract repository name
        run: echo "REPOSITORY_NAME=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV
        shell: bash

      - name: Set zip file env name
        run:
          echo "ZIP_NAME=${{env.REPOSITORY_NAME}}.zip" >> $GITHUB_ENV
          echo "ZIP_HASH_NAME=${{env.REPOSITORY_NAME}}-618be833-e568-4198-9132-29a90eb3803d-latest.zip" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Update submodules recursively
        run: git submodule update --init --recursive

      - name: Build headless in submodule
        run: |
          cd modules/easydb-webfrontend
          make all
          make headless
        shell: bash

      - name: Install ncc
        run: npm install -g @vercel/ncc

      - name: Build and Package
        shell: bash
        run:
          export RELEASE_TAG=${{ steps.get_version.outputs.VERSION }}
          make zip

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: true
          generate_release_notes: true
          files: |
            build/${{ env.ZIP_NAME }}
            README.md

      - name: Prepare Github Pages upload
        shell: bash
        run: |
          mkdir -p public
          cp build/${{ env.ZIP_NAME }} public/${{ env.ZIP_HASH_NAME }}

      - name: Upload to Github Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: "!github.event.release.prerelease"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
